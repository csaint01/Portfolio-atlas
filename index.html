#hdr{flex-shrink:0;background:#07080d;border-bottom:1px solid rgba(255,255,255,.07);padding:12px 14px 0}

.pbar{height:2px;background:#1a1a2e;margin-top:8px;display:none}
.pfill{height:100%;background:linear-gradient(90deg,#7c3aed,#2563eb);width:0%;transition:width .3s}
.chips{display:flex;gap:6px;overflow-x:auto;padding:7px 0 8px}

.chip{flex-shrink:0;display:flex;align-items:center;gap:5px;border-radius:8px;padding:4px 10px;font-size:11px}

.cr{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px}

// ─── SESSION ──────────────────────────────────────────────────────────────────
function getSess() {
var now = new Date();
var utc = now.getTime() + now.getTimezoneOffset()*60000;
var jan = new Date(now.getFullYear(),0,1).getTimezoneOffset();
var jul = new Date(now.getFullYear(),6,1).getTimezoneOffset();
var dst = Math.min(jan,jul) === now.getTimezoneOffset();
var et  = new Date(utc + 3600000*(dst?-4:-5));
var m   = et.getHours()*60+et.getMinutes();
var d   = et.getDay();
if(d===0||d===6)         return {l:“Weekend”,      c:”#6b7280”,dot:”#6b7280”,live:false};
if(m>=240 && m<570)      return {l:“Pre-Market”,   c:”#fbbf24”,dot:”#fbbf24”,live:true};
if(m>=570 && m<960)      return {l:“Market Open”,  c:”#22c55e”,dot:”#22c55e”,live:true};
if(m>=960 && m<1200)     return {l:“After Hours”,  c:”#a78bfa”,dot:”#a78bfa”,live:true};
return                          {l:“Market Closed”,c:”#6b7280”,dot:”#6b7280”,live:false};
}

// ─── PRICE FETCH VIA YAHOO FINANCE PROXY ─────────────────────────────────────
function fetchPrices() {
if(busy) return;
busy = true;
showPbar(true);
setRbtnLoading(true);
setPfill(10);

// Use Yahoo Finance via allorigins proxy to avoid CORS
var tickers = ALLT.join(”,”);
var url = “https://query1.finance.yahoo.com/v7/finance/quote?symbols=” + tickers + “&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent,preMarketPrice,preMarketChange,preMarketChangePercent,postMarketPrice,postMarketChange,postMarketChangePercent,marketState”;
var proxy = “https://api.allorigins.win/get?url=” + encodeURIComponent(url);

setPfill(30);
fetch(proxy)
.then(function(r){ return r.json(); })
.then(function(data){
setPfill(70);
var raw = JSON.parse(data.contents);
var results = raw.quoteResponse && raw.quoteResponse.result ? raw.quoteResponse.result : [];
results.forEach(function(q){
var price, change, changePct, sess;
var ms = (q.marketState || “”).toUpperCase();
if(ms === “PRE” && q.preMarketPrice){
price     = q.preMarketPrice;
change    = q.preMarketChange || 0;
changePct = q.preMarketChangePercent || 0;
sess      = “pre-market”;
} else if((ms === “POST” || ms === “POSTPOST”) && q.postMarketPrice){
price     = q.postMarketPrice;
change    = q.postMarketChange || 0;
changePct = q.postMarketChangePercent || 0;
sess      = “after-hours”;
} else {
price     = q.regularMarketPrice || 0;
change    = q.regularMarketChange || 0;
changePct = q.regularMarketChangePercent || 0;
sess      = ms === “REGULAR” ? “market” : “closed”;
}
PD[q.symbol] = {price:price, change:change, changePct:changePct, sess:sess};
});
setPfill(100);
busy = false;
showPbar(false);
setRbtnLoading(false);
var now = new Date();
var hs = document.getElementById(“hsub”);
if(hs) hs.innerHTML = ALLT.length + “ stocks  ·  “ + now.toLocaleTimeString();
renderChips();
renderTab();
})
.catch(function(e){
console.warn(“Price fetch error:”, e);
busy = false;
showPbar(false);
setRbtnLoading(false);
});
}
