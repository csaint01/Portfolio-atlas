function getSession(){
const now=new Date(),utc=now.getTime()+now.getTimezoneOffset()*60000;
const jan=new Date(now.getFullYear(),0,1).getTimezoneOffset(),jul=new Date(now.getFullYear(),6,1).getTimezoneOffset();
const et=new Date(utc+3600000*(Math.min(jan,jul)===now.getTimezoneOffset()?-4:-5));
const m=et.getHours()*60+et.getMinutes(),d=et.getDay();
if(d===0||d===6)return{l:“Weekend”,c:”#6b7280”,dot:”#6b7280”,live:false};
if(m>=240&&m<570) return{l:“Pre-Market”,c:”#fbbf24”,dot:”#fbbf24”,live:true};
if(m>=570&&m<960) return{l:“Market Open”,c:”#22c55e”,dot:”#22c55e”,live:true};
if(m>=960&&m<1200)return{l:“After Hours”,c:”#a78bfa”,dot:”#a78bfa”,live:true};
return{l:“Market Closed”,c:”#6b7280”,dot:”#6b7280”,live:false};
}

function updateSession(){
const s=getSession(),el=document.getElementById(“sbadge”);
if(!el)return;
el.style.cssText=`display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 8px;font-size:9.5px;font-weight:700;background:${s.dot}15;border:1px solid ${s.dot}35;color:${s.c}`;
el.innerHTML=`<span style="width:5px;height:5px;border-radius:50%;background:${s.dot};display:inline-block;animation:${s.live?"pulse 1.8s ease-in-out infinite":"none"}"></span> ${s.l}`;
}

async function loadPrices(){
if(loading)return;loading=true;
const pb=document.getElementById(“pbar”),pf=document.getElementById(“pfill”),rb=document.getElementById(“rbtn”);
if(pb)pb.style.display=“block”;
if(rb){rb.disabled=true;rb.innerHTML=’<span class="spinner"></span>’;}
const chs=[],sz=8;
for(let i=0;i<ALLT.length;i+=sz)chs.push(ALLT.slice(i,i+sz));
for(let ci=0;ci<chs.length;ci++){
if(pf)pf.style.width=Math.round((ci/chs.length)*90)+”%”;
try{
const r=await fetch(“https://api.anthropic.com/v1/messages”,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:1000,tools:[{type:“web_search_20250305”,name:“web_search”}],system:`Financial data assistant. Return ONLY raw JSON — no markdown: {"TICKER":{"price":123.45,"change":-1.23,"changePct":-0.98,"session":"market"},...} session: "pre-market","market","after-hours","closed". ONLY the JSON object.`,messages:[{role:“user”,content:`Current prices (include pre/after-market) for: ${chs[ci].join(", ")}`}]})});
const d=await r.json(),txt=(d.content||[]).filter(b=>b.type===“text”).map(b=>b.text).join(””),m=txt.match(/{[\s\S]*}/);
if(m)try{Object.assign(PD,JSON.parse(m[0]));}catch(e){}
}catch(e){}
if(ci<chs.length-1)await new Promise(r=>setTimeout(r,350));
}
if(pf)pf.style.width=“100%”;
loading=false;
if(pb)pb.style.display=“none”;
if(rb){rb.disabled=false;rb.innerHTML=’<span style="font-size:14px">↻</span>’;}
const lu=document.getElementById(“lupd”),ut=document.getElementById(“utime”);
if(lu&&ut){lu.style.display=“inline-flex”;ut.textContent=new Date().toLocaleTimeString();}
renderMovers();renderTab();
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function renderMovers(){

if(top)h+=`<div class="mover-chip" style="background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2)"><span style="color:#6b7280;font-size:9px;text-transform:uppercase">Top</span><span style="font-family:'IBM Plex Mono',monospace;color:#f9fafb;font-size:11px;font-weight:700">${top.ticker}</span><span class="up" style="font-family:'IBM Plex Mono',monospace;font-size:10px">+${PD[top.ticker].changePct.toFixed(2)}%</span></div>`;

function ds(n){let h=’<div class="dots">’;for(let i=0;i<10;i++)h+=`<div class="dot" style="background:${i<n?"#a78bfa":"rgba(255,255,255,0.1)"}"></div>`;return h+’</div>’;}
function tb(tier){const t=T[tier];if(!t)return””;return `<span class="tbadge" style="background:${t.bg};border:1px solid ${t.border};color:${t.color}">${t.emoji} ${t.label}</span>`;}
function st(sec,sc){return `<span class="stag" style="background:${sc}20;border:1px solid ${sc}40;color:${sc}">${sec.split(" / ")[0]}</span>`;}

function lp(ticker){
const d=PD[ticker];
if(!d?.price)return`<span style="font-family:'IBM Plex Mono',monospace;color:#374151;font-size:12px">—</span>`;
const up=d.change>0,dn=d.change<0,cls=up?“up”:dn?“down”:“flat”,arr=up?“▲”:dn?“▼”:”—”;
const sess=d.session&&d.session!==“market”?`<span class="psess"> ${d.session}</span>`:””;
return`<div class="pval">$${d.price.toFixed(2)}${sess}</div><div class="pchg ${cls}">${arr} ${up?"+":""}${d.change?.toFixed(2)} (${up?"+":""}${d.changePct?.toFixed(2)}%)</div>`;
}

function cBody(s){
const t=T[s.tier]||T.HOLD;

}
