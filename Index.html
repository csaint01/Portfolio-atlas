/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2d2d3a; border-radius: 3px; }

/* ── ANIMATIONS ── */
@keyframes pulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
@keyframes spin   { to{transform:rotate(360deg)} }
@keyframes shimmer{ 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes slideUp{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── UTILITY ── */
.live-dot { width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 1.8s ease-in-out infinite;flex-shrink:0; }
.spinner  { width:14px;height:14px;border:2px solid rgba(255,255,255,.1);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0; }
.skeleton { background:linear-gradient(90deg,#1a1a2e 25%,#252540 50%,#1a1a2e 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px; }
.price-up   { color:#22c55e; }
.price-down { color:#f87171; }
.price-flat { color:#6b7280; }
.slide-up { animation: slideUp 0.2s ease forwards; }

/* ── LAYOUT ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}

/* ── STICKY HEADER ── */
.header {
  flex-shrink: 0;
  background: #07080d;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 12px 16px 10px;
  position: sticky;
  top: 0;
  z-index: 50;
}

/* ── CONTENT SCROLL AREA ── */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 12px 8px;
  -webkit-overflow-scrolling: touch;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  flex-shrink: 0;
  background: #0a0c14;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bottom-nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex-shrink: 0;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 14px;
  min-width: 64px;
  color: #4b5563;
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 500;
  border-top: 2px solid transparent;
  transition: color 0.15s;
  white-space: nowrap;
}
.nav-btn .nav-icon { font-size: 16px; line-height: 1; }
.nav-btn.active { color: #a78bfa; border-top-color: #7c3aed; }
.nav-btn:active { opacity: 0.7; }

/* ── CARDS ── */
.card {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 8px;
  transition: border-color 0.2s;
}
.card.open { border-color: rgba(255,255,255,0.12); }
.card-header {
  padding: 13px 14px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.card-body {
  padding: 0 14px 13px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

/* ── PROGRESS BAR ── */
.progress-bar {
  height: 2px;
  background: #1a1a2e;
  border-radius: 1px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #2563eb);
  transition: width 0.3s ease;
  border-radius: 1px;
}

/* ── MOVERS STRIP ── */
.movers-strip {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 8px 0 2px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.movers-strip::-webkit-scrollbar { display: none; }
.mover-chip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 11px;
}

/* ── SECTOR TAGS ── */
.sector-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
}
.sector-tag {
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 9.5px;
  font-weight: 600;
}

/* ── REFRESH BTN ── */
.refresh-btn {
  background: rgba(124,58,237,0.1);
  border: 1px solid rgba(124,58,237,0.3);
  border-radius: 8px;
  padding: 6px 12px;
  color: #a78bfa;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.refresh-btn:disabled { opacity: 0.45; }
.refresh-btn:active { opacity: 0.7; }

/* ── METRIC BOX ── */
.metric-box { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 9px 11px; margin-bottom: 7px; }
.metric-label { color: #6b7280; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }

/* ── RESEARCH TABLE ── */
.research-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 14px;
  gap: 8px;
}

/* ── SWAP ROW ── */
.swap-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 0;
}

// ─── MARKET SESSION ──────────────────────────────────────────────────────────
function getMarketSession() {
const now = new Date();
const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
// Try to detect DST for ET
const janOffset = new Date(now.getFullYear(), 0, 1).getTimezoneOffset();
const julOffset = new Date(now.getFullYear(), 6, 1).getTimezoneOffset();
const isDST = Math.min(janOffset, julOffset) === now.getTimezoneOffset();
const etOffset = isDST ? -4 : -5;
const et = new Date(utc + 3600000 * etOffset);
const h = et.getHours(), m = et.getMinutes(), day = et.getDay();
const mins = h * 60 + m;
if (day === 0 || day === 6) return { label:“Weekend”,      color:”#6b7280”, dot:”#6b7280”, live:false };
if (mins >= 240 && mins < 570)  return { label:“Pre-Market”,  color:”#fbbf24”, dot:”#fbbf24”, live:true  };
if (mins >= 570 && mins < 960)  return { label:“Market Open”, color:”#22c55e”, dot:”#22c55e”, live:true  };
if (mins >= 960 && mins < 1200) return { label:“After Hours”, color:”#a78bfa”, dot:”#a78bfa”, live:true  };
return { label:“Market Closed”, color:”#6b7280”, dot:”#6b7280”, live:false };
}

// ─── PRICE FETCH ─────────────────────────────────────────────────────────────
async function fetchLivePrices(tickers, onProgress) {
const results = {};
const chunkSize = 8;
const chunks = [];
for (let i = 0; i < tickers.length; i += chunkSize) chunks.push(tickers.slice(i, i + chunkSize));
for (let ci = 0; ci < chunks.length; ci++) {
onProgress && onProgress(Math.round((ci / chunks.length) * 90));
try {
const resp = await fetch(“https://api.anthropic.com/v1/messages”, {
method:“POST”, headers:{“Content-Type”:“application/json”},
body: JSON.stringify({
model:“claude-sonnet-4-20250514”, max_tokens:1000,
tools:[{ type:“web_search_20250305”, name:“web_search” }],
system:`Financial data assistant. Search current stock prices including pre/after-market. Return ONLY raw JSON — no markdown, no explanation: {"TICKER":{"price":123.45,"change":-1.23,"changePct":-0.98,"session":"market"},...} session values: "pre-market","market","after-hours","closed". Return ONLY the JSON object.`,
messages:[{ role:“user”, content:`Current prices (include pre/after-market) for: ${chunks[ci].join(", ")}` }]
})
});
const data = await resp.json();
const text = (data.content||[]).filter(b=>b.type===“text”).map(b=>b.text).join(””);
const match = text.match(/{[\s\S]*}/);
if (match) { try { Object.assign(results, JSON.parse(match[0])); } catch(e){} }
} catch(e) { console.warn(“Fetch error chunk”, ci); }
if (ci < chunks.length - 1) await new Promise(r => setTimeout(r, 350));
}
onProgress && onProgress(100);
return results;
}
